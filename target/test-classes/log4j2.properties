# Root logger level
status = error
name = PropertiesConfig

# -----------------------------
# Console Appender
# -----------------------------
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] [%t] %-5level %logger - %msg%n

# -----------------------------
# File Appender
# -----------------------------
appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = logs/automation.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] [%t] %-5level %logger - %msg%n

# ---------------- Debug File Appender ----------------
appender.debug.type = File
appender.debug.name = DebugAppender
appender.debug.fileName = logs/debug.log
appender.debug.layout.type = PatternLayout
appender.debug.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] %-5level %logger - %msg%n

# -----------------------------
# Root Logger
# -----------------------------
rootLogger.level = info
rootLogger.appenderRefs = console, file,debug
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender
rootLogger.appenderRef.debug.ref = DebugAppender